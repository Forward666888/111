  t[si].classList.add("on");
  var x = document.querySelectorAll("#main > div");
  for (var i=0;i<x.length;i++) x[i].style.display="none";
  gid("x"+ui+"-"+si).style.display="block";
}

function rQ(ui,si,q) {
  var k = ui+"-"+si+"-"+q.id;
  var st = S[k]||{}, a = q.a, opts = q.o;
  var h = '<div class="qc" id="c'+k+'"><div class="qh"><span class="qn">'+q.id+'.</span><span>'+q.q+'</span>';
  if (st.ch && q.t) { h += '<div style="font-size:13px;color:#888;margin-top:4px;font-weight:400">'+q.t+'</div>'; }
  h += '</div>';
  h += '<div class="os">';
  var ll = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  opts.forEach(function(o,i) {
    var le = ll[i], cl = st.ch ? (le===a?"r":(st.s===le?"w":"")) : (st.s===le?"s":"");
    h += '<div class="op '+cl+'" data-k="'+k+'" data-l="'+le+'">';
    h += '<span class="l">'+le+'</span><span>'+o+'</span>';
    if (st.ch && q.ot && q.ot[i]) { h += ' <span style="color:#888;font-size:13px">('+q.ot[i]+')</span>'; }
    h += '</div>';
  });
  h += '</div><div class="qf">';
  if (st.ch) {
    h += '<span class="r '+(st.ok?"g":"b")+'">'+(st.ok?"正确!":"答案: "+a)+'</span>';
  }
  h += '</div></div>';
  return h;
}


function rC(ui,si,s) {
  var k = ui+"-"+si, cs = C[k]||{};
  var h = '<div class="cc"><div class="ci">';
  if (AB !== null && cs[AB] && !cs[AB].ch) {
    h += '已选中第 ['+AB+'] 个空，请点击下方词库中的单词填入。';
  } else {
    h += '点击文章中的空白 [###]，再点击下方词库中的单词填入。';
  }
  h += '</div><div class="cp">';
  s.passage.forEach(function(p) {
    h += "<p>"+p.replace(/\[(\d+)\]/g, function(m,num) {
      var id = parseInt(num), st = cs[id], cl = "bs", co = "___";
      if(st) {
        if(st.ch){ cl+=st.ok?" r":" w"; co=st.s||"___"; }
        else if(st.s){ cl+=" f"; co=st.s; }
      }
      if (AB===id && (!st||!st.ch)) cl+=" a";
      return '<span class="'+cl+'" data-ui="'+ui+'" data-si="'+si+'" data-bid="'+id+'"><span>'+co+'</span><span class="bn">'+id+'</span></span>';
    }) + "</p>";
  });
  h += '</div><div class="wb"><div class="t">词库:</div><div class="g">';
  s.wordBank.forEach(function(w) {
    var u = 0;
    s.blanks.forEach(function(b){ var st=cs[b[0]]; if(st&&st.s===w[0]&&!st.ch) u=1; });
    h += '<button class="wbt'+(u?" u":"")+'" data-ui="'+ui+'" data-si="'+si+'" data-le="'+w[0]+'"><span class="wl">'+w[0]+'</span>'+w[1]+'</button>';
  });
  h += '</div></div>';
  var d=0,o=0;
  s.blanks.forEach(function(b){ var st=cs[b[0]]; if(st&&st.ch){d++;if(st.ok)o++;} });
  if (d>0) { h += '<div style="text-align:center;padding:10px;font-size:16px;font-weight:700;color:'+(o===d?"#4caf50":"#f44336")+'">'+o+"/"+d+" 正确</div>"; }
  if (d>0 && s.pt) { h += '<div style="margin-top:10px;padding:12px;background:#f5f5f5;border-radius:8px;font-size:14px;line-height:1.8;border-left:3px solid #1a237e">📖 '+s.pt+'</div>'; }
  
  h += '<div class="ca"><button class="cac" data-ui="'+ui+'" data-si="'+si+'">批改全部</button><button class="car" data-ui="'+ui+'" data-si="'+si+'">重置</button></div></div>';
  return h;
}

// Event delegation
document.addEventListener("click", function(e) {
  var op = e.target.closest(".op");
  if (op) {
    var k = op.dataset.k, l = op.dataset.l;
    var st = S[k]; if (!st||st.ch) return;
    st.s = l; st.ch = 1;
    var ps = k.split("-").map(Number), ui=ps[0], si=ps[1], qid=ps[2];
    var ql = D[ui].sections[si].questions;
    for (var i=0;i<ql.length;i++) { if (ql[i].id === qid) { st.ok = (l === ql[i].a); break; } }
    if (!st.ok) {
      var qf = null; ql.forEach(function(qx){if(qx.id===qid)qf=qx;});
      if (qf) addW(k,D[ui].name,D[ui].sections[si].name,qf.q,qf.o,l,qf.a);
    } else {
      var w=getW(); for(var wi=0;wi<w.length;wi++){if(w[wi].k===k){w.splice(wi,1);setW(w);uB();break;}}
    }
    var card = op.closest(".qc");
    if (card) { var qf=null; ql.forEach(function(qx){if(qx.id===qid)qf=qx;}); if(qf) card.outerHTML = rQ(ui,si,qf); }
    // Auto translate
    uS(); return;
  }
  var bs = e.target.closest(".bs");
  if (bs) {
    var ui = parseInt(bs.dataset.ui), si = parseInt(bs.dataset.si), bid = parseInt(bs.dataset.bid);
    var k = ui+"-"+si, st = C[k][bid];
    if (!st||st.ch) return;
    if (AB===bid) { st.s=null; AB=null; }
    else if (st.s) { st.s=null; AB=null; }
    else AB=bid;
    cU(ui,si); return;
  }
  var wb = e.target.closest(".wbt");
  if (wb && !wb.classList.contains("u")) {
    if (AB===null) return;
    var ui = parseInt(wb.dataset.ui), si = parseInt(wb.dataset.si), le = wb.dataset.le;
    var k = ui+"-"+si, cs = C[k], st = cs[AB];
    if (!st||st.ch) return;
    var used = false;
    Object.keys(cs).forEach(function(kk){ if(cs[kk].s===le&&!cs[kk].ch&&parseInt(kk)!==AB) used=true; });
    if (used) return;
    st.s = le; AB=null;
    cU(ui,si); return;
  }
  var cac = e.target.closest(".cac");
  if (cac) {
    var ui = parseInt(cac.dataset.ui), si = parseInt(cac.dataset.si);
    var k = ui+"-"+si, cs = C[k];
    var s = D[ui].sections[si];
    s.blanks.forEach(function(b){
      var st = cs[b[0]];
      if (st && st.s && !st.ch) {
        st.ch = 1;
        st.ok = st.s === b[1];
        if (!st.ok) {
          var fullText = s.passage.join(" ");
          var sentences = fullText.split(/(?<=[.!?])\s+/);
          var sentText = "";
          for (var si2=0;si2<sentences.length;si2++) {
            if (sentences[si2].indexOf("["+b[0]+"]") >= 0) {
              sentText = sentences[si2].replace(/\[\d+\]/g, "___");
              break;
            }
          }
          if (!sentText) sentText = "Blank [" + b[0] + "]";
          var userWord = "";
          s.wordBank.forEach(function(wb){ if(wb[0]===st.s) userWord = wb[1]; });
          var corrWord = "";
          s.wordBank.forEach(function(wb){ if(wb[0]===b[1]) corrWord = wb[1]; });
          var wk = ui+"-"+si+"-c"+b[0];
          addW(wk, D[ui].name, s.name, sentText, [userWord, corrWord], "wrong", corrWord);
        }
      }
    });
    cU(ui,si); uS();
    
    return;
  }
  var car = e.target.closest(".car");
  if (car) {
    var ui = parseInt(car.dataset.ui), si = parseInt(car.dataset.si);
    var k = ui+"-"+si;
    Object.keys(C[k]).forEach(function(kk){ C[k][kk]={s:null,ch:0,ok:0}; });
    AB=null; cU(ui,si); uS(); return;
  }
  var qtr = e.target.closest(".qtr");
  if (qtr) {
    var id = qtr.id;
    if (!id || !id.startsWith("tr")) return;
    var k = id.substring(2);
    if (qtr.dataset.loaded) return;
    fetchTr(k, qtr);
    return;
  }
});

function cU(ui,si) {
  gid("x"+ui+"-"+si).innerHTML = rC(ui,si,D[ui].sections[si]);
  sS(ui,si);
}

function uS() {
  var d=0,o=0,t=0;
  Object.keys(S).forEach(function(k){ t++; if(S[k].ch){d++;if(S[k].ok)o++;} });
  Object.keys(C).forEach(function(ck){
    Object.keys(C[ck]).forEach(function(kk){ t++; if(C[ck][kk].ch){d++;if(C[ck][kk].ok)o++;} });
  });
  gid("tq").textContent = t;
  gid("dq").textContent = d;
  gid("cq").textContent = o;
  gid("ar").textContent = d?Math.round(o/d*100)+"%":"0%";
}

    q.o=opts;
    for(var i=0;i<opts.length;i++){if(opts[i]===ansT){q.a=ll[i];break;}}
