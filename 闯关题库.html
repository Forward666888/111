function eW(){var w=getW();if(!w.length){alert("没有错题可导出");return}var str=JSON.stringify(w);navigator.clipboard.writeText(str).then(function(){alert("已复制到剪贴板！\n在另一设备导入即可同步")},function(){prompt("手动复制下方代码到另一设备：",str)})}
function iW(){navigator.clipboard.readText().then(function(t){try{var d=JSON.parse(t);if(!Array.isArray(d))throw"bad";setW(d);uB();sW();alert("已导入 "+d.length+" 条错题！")}catch(e){alert("数据无效")}},function(){alert("无法读取剪贴板，请手动复制")})}
function sW(){var w=getW(),m=gid("main");if(!w.length){m.innerHTML='<div class="wv"><h3>📝 错题集</h3><div class="wvi" style="text-align:center;padding:40px">暂无错题，继续加油！🎉</div></div>';return;}
var h='<div class="wv"><h3>📝 错题集</h3><div class="wvi">共 <b>'+w.length+'</b> 道错题。<br><button class="wbtn d" onclick="clW()">🗑️ 清空</button> <button class="wbtn p" onclick="eW()">📤 导出</button> <button class="wbtn p" onclick="iW()">📥 导入</button></div>';
w.forEach(function(q){var ll="ABCDEFGHIJKLMNOPQRSTUVWXYZ";h+='<div class="wq"><div class="wi">'+q.un+' | '+q.sn+' | '+q.ts+'</div><div class="qt">'+(q.qt||"")+'</div>';if(q.op){if(q.op.length===2&&q.ua==="wrong"){h+='<div class="wqa w">\u274c 你的答案: '+q.op[0]+'</div>';h+='<div class="wqa r">\u2714\ufe0f 正确答案: '+q.op[1]+'</div>'}else{var uai=-1,cai=-1;q.op.forEach(function(o,i){if(ll[i]===q.ua)uai=i;if(ll[i]===q.ca)cai=i});h+='<div class="wqa w">\u274c 你的答案: '+(uai>=0?q.op[uai]:q.ua)+'</div>';h+='<div class="wqa r">\u2714\ufe0f 正确答案: '+(cai>=0?q.op[cai]:q.ca)+'</div>'}}h+='</div>';});
m.innerHTML=h;}

function rN() {
  var h = "";
  D.forEach(function(u,i) {
    h += '<div class="snav-i'+(i===0?" on":"")+'" onclick="sU('+i+')">';
    h += '<div class="ti">'+u.name+'</div><div class="su">'+u.subtitle+'</div></div>';
  });
  h += '<div class="snav-i" id="wrongNav"><div class="ti">📝 错题集<span class="snb"></span></div><div class="su">查看错题</div></div>';
  gid("nav").innerHTML = h;
  var wn = gid("wrongNav");
  if (wn) wn.onclick = function() {
    document.querySelectorAll(".snav-i").forEach(function(e){e.classList.remove("on");});
    wn.classList.add("on");
    sW();
  };
  uB();
}

function sU(ui) {
  var els = document.querySelectorAll(".snav-i");
  for (var i=0;i<els.length;i++) els[i].classList.remove("on");
  els[ui].classList.add("on");
  var u = D[ui];
  var h = '<div class="stabs">';
  h += '<button class="bback" onclick="sU('+ui+'); sS('+ui+',0)">&#x2190; 返回</button>';
  u.sections.forEach(function(s,i) {
    h += '<button class="stab'+(i===0?" on":"")+'" onclick="sS('+ui+','+i+')">'+s.name+'</button>';
  });
  h += '</div>';
  u.sections.forEach(function(s,si) {
    h += '<div id="x'+ui+"-"+si+'"'+(si!==0?' style="display:none"':'')+'>';
    if (s.type==="cloze") { h += rC(ui,si,s); }
    else { s.questions.forEach(function(q){ h += rQ(ui,si,q); }); }
    h += '<div class="snav-b">';
    h += '<button class="prev"'+(si===0?' disabled':'')+' onclick="sS('+ui+','+(si-1)+')">← 上一节</button>';
    h += '<button class="next"'+(si===u.sections.length-1?' disabled':'')+' onclick="sS('+ui+','+(si+1)+')">下一节 →</button>';
    h += '</div></div>';
  });
  gid("main").innerHTML = h;
  uS();
}

function sS(ui,si) {
  var t = document.querySelectorAll(".stab");
  for (var i=0;i<t.length;i++) t[i].classList.remove("on");
  t[si].classList.add("on");
  var x = document.querySelectorAll("#main > div");
  for (var i=0;i<x.length;i++) x[i].style.display="none";
  gid("x"+ui+"-"+si).style.display="block";
}

function rQ(ui,si,q) {
  var k = ui+"-"+si+"-"+q.id;
  var st = S[k]||{}, a = q.a, opts = q.o;
  var h = '<div class="qc" id="c'+k+'"><div class="qh"><span class="qn">'+q.id+'.</span><span>'+q.q+'</span></div>';
  if (st.ch) {
    h += '<div class="qtr" id="tr'+k+'">⏳ 翻译中...</div>';
  }
  h += '<div class="os">';
  var ll = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  opts.forEach(function(o,i) {
    var le = ll[i], cl = st.ch ? (le===a?"r":(st.s===le?"w":"")) : (st.s===le?"s":"");
    h += '<div class="op '+cl+'" data-k="'+k+'" data-l="'+le+'">';
    h += '<span class="l">'+le+'</span><span>'+o+'</span></div>';
  });
  h += '</div><div class="qf">';
  if (st.ch) {
    h += '<span class="r '+(st.ok?"g":"b")+'">'+(st.ok?"正确!":"答案: "+a)+'</span>';
  }
  h += '</div></div>';
  return h;
}

function autoTr(k) {
  var el = gid("tr"+k);
  if (!el || el.dataset.loaded) return;
  el.innerHTML = "翻译中...";
  var ps = k.split("-").map(Number);
  var q = null;
  for (var i=0;i<D[ps[0]].sections[ps[1]].questions.length;i++) {
    if (D[ps[0]].sections[ps[1]].questions[i].id === ps[2]) { q = D[ps[0]].sections[ps[1]].questions[i]; break; }
  }
  if (!q) return;
  var txt = q.q + "\nA) " + (q.o[0]||"") + "\nB) " + (q.o[1]||"") + "\nC) " + (q.o[2]||"") + "\nD) " + (q.o[3]||"");
  tryMM(k, el, q, txt);
}
function tryMM(k, el, q, txt) {
  var cb = "tc" + k.replace(/-/g,""), done = 0;
  window[cb] = function(r) {
    if (done) return; done = 1;
    try {
      var t = (r.responseData||{}).translatedText || "";
      if (t && t.indexOf("MYMEMORY") < 0) { showTrRes(el, t, q.a); el.dataset.loaded = "1"; delete window[cb]; return; }
    } catch(e) {}
    delete window[cb]; tryGgl(k, el, q, txt);
  };
  var s = document.createElement("script");
  s.src = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(txt) + "&langpair=en|zh-CN&jsoncallback=" + cb;
  document.body.appendChild(s);
  setTimeout(function(){if(!done&&!el.dataset.loaded){done=1;delete window[cb];tryGgl(k,el,q,txt);}},4000);
}
function tryGgl(k, el, q, txt) {
  if (el.dataset.loaded) return;
  fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=" + encodeURIComponent(txt))
    .then(function(r){ if(!r.ok)throw Error(); return r.json(); })
    .then(function(d){
      try {
        var ls=[],i; for(i=0;i<d[0].length;i++) ls.push(d[0][i][0]);
        var t = ls.join("");
        if (t) { showTrRes(el, t, q.a); el.dataset.loaded = "1"; return; }
      } catch(e) {}
      el.innerHTML = "翻译不可用";
    })
    .catch(function(){ el.innerHTML = "翻译不可用"; });
}
function showTrRes(el, t, ca) {
  var parts = t.split("\n"), html = "";
  for (var pi=0;pi<parts.length;pi++) {
    var line = parts[pi].trim(); if (!line) continue;
    if (/^[A-D]\)/.test(line)) {
      var letter = line.charAt(0), isC = letter === ca;
      var st = 'padding:2px 0;font-size:14px' + (isC ? ';color:#d32f2f;font-weight:700' : '');
      html += '<div style="' + st + '">' + (isC ? '\u2705 ' : '') + line + (isC ? ' <span style="font-size:12px;color:#999">(正确答案)</span>' : '') + '</div>';
    } else { html += '<div style="font-weight:600;margin-bottom:4px;font-size:14px">' + line + '</div>'; }
  }
  el.innerHTML = html;
}
function clozeTr(ui, si) {
  var el = gid("trc"+ui+"-"+si);
  if (!el || el.dataset.loaded) return;
  var s = D[ui].sections[si];
  if (!s || s.type !== "cloze") return;
  var cs = C[ui+"-"+si] || {};
  var txt = s.passage.join(" ").replace(/\[(\d+)\]/g, function(m, num) {
    var id = parseInt(num), st = cs[id];
    if (st && st.s) { var w = null; s.wordBank.forEach(function(wb){ if(wb[0]===st.s) w=wb[1]; }); return w || "___"; }
    return "___";
  });
  el.innerHTML = "翻译全文...";
  el.style.display = "block";
  tryMMc(ui, si, el, txt);
}
function tryMMc(ui, si, el, txt) {
  var cb = "ct" + ui + "_" + si, done = 0;
  window[cb] = function(r) {
    if (done) return; done = 1;
    try {
      var t = (r.responseData||{}).translatedText || "";
      if (t && t.indexOf("MYMEMORY") < 0) { el.innerHTML = t; el.dataset.loaded = "1"; delete window[cb]; return; }
    } catch(e) {}
    delete window[cb]; tryGglc(ui, si, el, txt);
  };
  var s2 = document.createElement("script");
  s2.src = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(txt) + "&langpair=en|zh-CN&jsoncallback=" + cb;
  document.body.appendChild(s2);
  setTimeout(function(){if(!done&&!el.dataset.loaded){done=1;delete window[cb];tryGglc(ui,si,el,txt);}},4000);
}
function tryGglc(ui, si, el, txt) {
  if (el.dataset.loaded) return;
  fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=" + encodeURIComponent(txt))
    .then(function(r){ if(!r.ok)throw Error(); return r.json(); })
    .then(function(d){
      try { var ls=[],i; for(i=0;i<d[0].length;i++) ls.push(d[0][i][0]); var t=ls.join(""); if(t){el.innerHTML=t;el.dataset.loaded="1";return;} } catch(e) {}
      el.innerHTML = "翻译不可用";
    })
    .catch(function(){ el.innerHTML = "翻译不可用"; });
}
function rC(ui,si,s) {
  var k = ui+"-"+si, cs = C[k]||{};
  var h = '<div class="cc"><div class="ci">';
  if (AB !== null && cs[AB] && !cs[AB].ch) {
    h += '已选中第 ['+AB+'] 个空，请点击下方词库中的单词填入。';
  } else {
    h += '点击文章中的空白 [###]，再点击下方词库中的单词填入。';
  }
  h += '</div><div class="cp">';
  s.passage.forEach(function(p) {
    h += "<p>"+p.replace(/\[(\d+)\]/g, function(m,num) {
      var id = parseInt(num), st = cs[id], cl = "bs", co = "___";
      if(st) {
        if(st.ch){ cl+=st.ok?" r":" w"; co=st.s||"___"; }
        else if(st.s){ cl+=" f"; co=st.s; }
      }
      if (AB===id && (!st||!st.ch)) cl+=" a";
      return '<span class="'+cl+'" data-ui="'+ui+'" data-si="'+si+'" data-bid="'+id+'"><span>'+co+'</span><span class="bn">'+id+'</span></span>';
    }) + "</p>";
  });
  h += '</div><div class="wb"><div class="t">词库:</div><div class="g">';
  s.wordBank.forEach(function(w) {
    var u = 0;
    s.blanks.forEach(function(b){ var st=cs[b[0]]; if(st&&st.s===w[0]&&!st.ch) u=1; });
    h += '<button class="wbt'+(u?" u":"")+'" data-ui="'+ui+'" data-si="'+si+'" data-le="'+w[0]+'"><span class="wl">'+w[0]+'</span>'+w[1]+'</button>';
  });
  h += '</div></div>';
  var d=0,o=0;
  s.blanks.forEach(function(b){ var st=cs[b[0]]; if(st&&st.ch){d++;if(st.ok)o++;} });
  if (d>0) { h += '<div style="text-align:center;padding:10px;font-size:16px;font-weight:700;color:'+(o===d?"#4caf50":"#f44336")+'">'+o+"/"+d+" 正确</div>"; }
  h += '<div id="trc'+ui+"-"+si+'" class="qtr" style="display:'+(d>0?"block":"none")+'">⏳ 翻译全文...</div>';
  h += '<div class="ca"><button class="cac" data-ui="'+ui+'" data-si="'+si+'">批改全部</button><button class="car" data-ui="'+ui+'" data-si="'+si+'">重置</button></div></div>';
  return h;
}

// Event delegation
document.addEventListener("click", function(e) {
  var op = e.target.closest(".op");
  if (op) {
    var k = op.dataset.k, l = op.dataset.l;
    var st = S[k]; if (!st||st.ch) return;
    st.s = l; st.ch = 1;
    var ps = k.split("-").map(Number), ui=ps[0], si=ps[1], qid=ps[2];
    var ql = D[ui].sections[si].questions;
    for (var i=0;i<ql.length;i++) { if (ql[i].id === qid) { st.ok = (l === ql[i].a); break; } }
    if (!st.ok) {
      var qf = null; ql.forEach(function(qx){if(qx.id===qid)qf=qx;});
      if (qf) addW(k,D[ui].name,D[ui].sections[si].name,qf.q,qf.o,l,qf.a);
    } else {
      var w=getW(); for(var wi=0;wi<w.length;wi++){if(w[wi].k===k){w.splice(wi,1);setW(w);uB();break;}}
    }
    var card = op.closest(".qc");
    if (card) { var qf=null; ql.forEach(function(qx){if(qx.id===qid)qf=qx;}); if(qf) card.outerHTML = rQ(ui,si,qf); }
    // Auto translate
    setTimeout(function(){ autoTr(k); }, 100);
    uS(); return;
  }
  var bs = e.target.closest(".bs");
  if (bs) {
    var ui = parseInt(bs.dataset.ui), si = parseInt(bs.dataset.si), bid = parseInt(bs.dataset.bid);
    var k = ui+"-"+si, st = C[k][bid];
    if (!st||st.ch) return;
    if (AB===bid) { st.s=null; AB=null; }
    else if (st.s) { st.s=null; AB=null; }
    else AB=bid;
    cU(ui,si); return;
  }
  var wb = e.target.closest(".wbt");
  if (wb && !wb.classList.contains("u")) {
    if (AB===null) return;
    var ui = parseInt(wb.dataset.ui), si = parseInt(wb.dataset.si), le = wb.dataset.le;
    var k = ui+"-"+si, cs = C[k], st = cs[AB];
    if (!st||st.ch) return;
    var used = false;
    Object.keys(cs).forEach(function(kk){ if(cs[kk].s===le&&!cs[kk].ch&&parseInt(kk)!==AB) used=true; });
    if (used) return;
    st.s = le; AB=null;
    cU(ui,si); return;
  }
  var cac = e.target.closest(".cac");
  if (cac) {
    var ui = parseInt(cac.dataset.ui), si = parseInt(cac.dataset.si);
    var k = ui+"-"+si, cs = C[k];
    var s = D[ui].sections[si];
    s.blanks.forEach(function(b){
      var st = cs[b[0]];
      if (st && st.s && !st.ch) {
        st.ch = 1;
        st.ok = st.s === b[1];
        if (!st.ok) {
          var fullText = s.passage.join(" ");
          var sentences = fullText.split(/(?<=[.!?])\s+/);
          var sentText = "";
          for (var si2=0;si2<sentences.length;si2++) {
            if (sentences[si2].indexOf("["+b[0]+"]") >= 0) {
              sentText = sentences[si2].replace(/\[\d+\]/g, "___");
              break;
            }
          }
          if (!sentText) sentText = "Blank [" + b[0] + "]";
          var userWord = "";
          s.wordBank.forEach(function(wb){ if(wb[0]===st.s) userWord = wb[1]; });
          var corrWord = "";
          s.wordBank.forEach(function(wb){ if(wb[0]===b[1]) corrWord = wb[1]; });
          var wk = ui+"-"+si+"-c"+b[0];
          addW(wk, D[ui].name, s.name, sentText, [userWord, corrWord], "wrong", corrWord);
        }
      }
    });
    cU(ui,si); uS();
    setTimeout(function(){ clozeTr(ui, si); }, 200);
    return;
  }
  var car = e.target.closest(".car");
  if (car) {
    var ui = parseInt(car.dataset.ui), si = parseInt(car.dataset.si);
    var k = ui+"-"+si;
    Object.keys(C[k]).forEach(function(kk){ C[k][kk]={s:null,ch:0,ok:0}; });
    AB=null; cU(ui,si); uS(); return;
  }
  var qtr = e.target.closest(".qtr");
  if (qtr) {
    var id = qtr.id;
    if (!id || !id.startsWith("tr")) return;
    var k = id.substring(2);
    if (qtr.dataset.loaded) return;
    fetchTr(k, qtr);
    return;
  }
});

function cU(ui,si) {
  gid("x"+ui+"-"+si).innerHTML = rC(ui,si,D[ui].sections[si]);
  sS(ui,si);
}

function uS() {
  var d=0,o=0,t=0;
  Object.keys(S).forEach(function(k){ t++; if(S[k].ch){d++;if(S[k].ok)o++;} });
  Object.keys(C).forEach(function(ck){
    Object.keys(C[ck]).forEach(function(kk){ t++; if(C[ck][kk].ch){d++;if(C[ck][kk].ok)o++;} });
  });
  gid("tq").textContent = t;
  gid("dq").textContent = d;
  gid("cq").textContent = o;
  gid("ar").textContent = d?Math.round(o/d*100)+"%":"0%";
}

init();
</script>
